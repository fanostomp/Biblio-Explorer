{% extends 'base.html' %}
{% block content %}
<div class="profile-header">
    <div class="search-section">
        <input type="text" id="conferenceSearch" placeholder="Search conference by acronym or title..." autocomplete="off">
        <ul id="conferenceDropdown" class="autocomplete-list"></ul>
    </div>
    <div id="conferenceDetails" style="display: none;">
        <h1 id="confTitle">Conference Title</h1>
        <div class="badges">
            <span class="badge rank-badge" id="confRank">Rank: A*</span>
            <span class="badge" id="confAcronym">Acronym</span>
            <span class="badge category-badge" id="confCategory">Category</span>
        </div>
        <p id="confDates" class="text-muted"></p>
    </div>
</div>

<div class="filters-section" id="filtersSection" style="display: none;">
    <div class="filter-group">
        <label>Year Range:</label>
        <input type="number" id="startYear" placeholder="From" min="1950" max="2026">
        <span>-</span>
        <input type="number" id="endYear" placeholder="To" min="1950" max="2026">
        <button id="applyFilters" class="btn">Apply</button>
    </div>
</div>

<div class="dashboard-grid" id="dashboardGrid" style="display: none;">
    <div class="chart-container">
        <h3>Publications over Time</h3>
        <div id="papersChart"></div>
    </div>
    
    <div class="chart-container">
        <h3>Authorship Trends</h3>
        <div id="authorsChart"></div>
    </div>
    
    <div class="table-container full-width">
        <h3>Published Papers</h3>
        <div class="table-responsive">
            <table id="papersTable">
                <thead>
                    <tr>
                        <th>Year</th>
                        <th>Title</th>
                        <th>Pages</th>
                        <th>Links</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
